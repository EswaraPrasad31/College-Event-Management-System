<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FAQ - CVR Events</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">CVR Events</a>
      </div>
    </nav>

    <div class="container py-5">
      <h2 class="section-title">Frequently Asked Questions</h2>

      <div class="accordion" id="faqAccordion">
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button
              class="accordion-button"
              data-bs-toggle="collapse"
              data-bs-target="#faq1"
            >
              How do I register?
            </button>
          </h2>

          <div id="faq1" class="accordion-collapse collapse show">
            <div class="accordion-body">
              Visit the Registration page and fill out the form.
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <h2 class="accordion-header">
            <button
              class="accordion-button collapsed"
              data-bs-toggle="collapse"
              data-bs-target="#faq2"
            >
              Is there any registration fee?
            </button>
          </h2>

          <div id="faq2" class="accordion-collapse collapse">
            <div class="accordion-body">
              No. Participation is completely free.
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <h2 class="accordion-header">
            <button
              class="accordion-button collapsed"
              data-bs-toggle="collapse"
              data-bs-target="#faq3"
            >
              Can I participate in multiple events?
            </button>
          </h2>

          <div id="faq3" class="accordion-collapse collapse">
            <div class="accordion-body">
              Yes. Students can participate in multiple events.
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <div class="container text-center">
        © 2026 CVR College Event Management System
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
